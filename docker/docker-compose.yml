version: '3.8'

services:
  # 1. Tầng Data Lake (Lưu trữ dữ liệu thô / Iceberg)
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "dtai16805"
      MINIO_ROOT_PASSWORD: "dtai16805"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # 1b. Tạo bucket khi MinIO khởi động
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 5 &&
        mc alias set local http://minio:9000 dtai16805 dtai16805 &&
        mc mb --ignore-existing local/iceberg-warehouse &&
        echo 'Bucket iceberg-warehouse ready.'
      "

  # 2. StarRocks — chay tren Minikube, KHONG dung Docker
  # starrocks:
  #   image: starrocks/allin1-ubuntu:latest
  #   container_name: starrocks-all-in-one
  #   ports:
  #     - "9030:9030"
  #     - "8030:8030"
  #   volumes:
  #     - starrocks_data:/starrocks/fe/meta

  # PostgreSQL (Superset metadata)
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "demo"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # PostgreSQL (Hive Metastore backend)
  postgres-hive:
    image: postgres:15-alpine
    container_name: postgres-hive
    environment:
      POSTGRES_USER: "hive"
      POSTGRES_PASSWORD: "hive123"
      POSTGRES_DB: "metastore"
    ports:
      - "5433:5432"
    volumes:
      - postgres_hive_data:/var/lib/postgresql/data

  # Hive Metastore — chay tren Minikube, KHONG dung Docker
  # hive-metastore:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.hive
  #   container_name: hive-metastore
  #   ports:
  #     - "9083:9083"
  #   depends_on:
  #     - postgres-hive
  #     - minio
  #   environment:
  #     HIVE_CONF_DIR: /opt/hive/conf
  #   command: >
  #     /bin/sh -c "
  #       /opt/hive/bin/schematool -dbType postgres -info 2>/dev/null || /opt/hive/bin/schematool -dbType postgres -initSchema --verbose &&
  #       /opt/hive/bin/hive --service metastore
  #     "
  #   volumes:
  #     - ./core-site.xml:/opt/hive/conf/core-site.xml:ro

  # 3. Tầng Visualization (Dashboard)
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    image: apache/superset-custom:latest
    container_name: apache-superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY="7fc80bc34090b9dc3017dbac6527fd96"
    user: "root"
    entrypoint: >
      sh -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Tai --lastname Duong --email tai.dv@hus.edu.vn --password admin &&
        superset init &&
        /usr/bin/run-server.sh
      "
    depends_on:
      - postgres

volumes:
  minio_data:
  postgres_data:
  postgres_hive_data:
