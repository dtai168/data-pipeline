apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-metastore-config
  namespace: trino
data:
  metastore-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <property>
        <name>metastore.thrift.uris</name>
        <value>thrift://0.0.0.0:9083</value>
      </property>
      <property>
        <name>metastore.task.threads.always</name>
        <value>org.apache.hadoop.hive.metastore.events.EventCleanerTask</value>
      </property>
      <property>
        <name>metastore.expression.proxy</name>
        <value>org.apache.hadoop.hive.metastore.DefaultPartitionExpressionProxy</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionDriverName</name>
        <value>org.postgresql.Driver</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionURL</name>
        <value>jdbc:postgresql://postgres:5432/metastore</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionUserName</name>
        <value>hive</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionPassword</name>
        <value>hive123</value>
      </property>
      <property>
        <name>hive.metastore.warehouse.dir</name>
        <value>s3a://iceberg-warehouse/chatbot_data</value>
      </property>
      <property>
        <name>fs.s3a.endpoint</name>
        <value>http://host.minikube.internal:9000</value>
      </property>
      <property>
        <name>fs.s3a.access.key</name>
        <value>dtai16805</value>
      </property>
      <property>
        <name>fs.s3a.secret.key</name>
        <value>dtai16805</value>
      </property>
      <property>
        <name>fs.s3a.path.style.access</name>
        <value>true</value>
      </property>
      <property>
        <name>fs.s3a.impl</name>
        <value>org.apache.hadoop.fs.s3a.S3AFileSystem</value>
      </property>
      <property>
        <name>fs.s3a.connection.ssl.enabled</name>
        <value>false</value>
      </property>
      <property>
        <name>datanucleus.schema.autoCreateAll</name>
        <value>true</value>
      </property>
      <property>
        <name>datanucleus.schema.autoCreateTables</name>
        <value>true</value>
      </property>
    </configuration>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore
  namespace: trino
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hive-metastore
  template:
    metadata:
      labels:
        app: hive-metastore
    spec:
      containers:
        - name: hive-metastore
          image: hive-metastore:v3
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              cp /config/metastore-site.xml /opt/hive/conf/metastore-site.xml
              export HADOOP_CLASSPATH=/opt/hive/lib/postgresql-42.6.0.jar:/opt/hadoop/share/hadoop/tools/lib/hadoop-aws-3.3.6.jar:/opt/hadoop/share/hadoop/tools/lib/aws-java-sdk-bundle-1.12.367.jar
              export HIVE_AUX_JARS_PATH=/opt/hive/lib/postgresql-42.6.0.jar,/opt/hadoop/share/hadoop/tools/lib/hadoop-aws-3.3.6.jar,/opt/hadoop/share/hadoop/tools/lib/aws-java-sdk-bundle-1.12.367.jar
              /opt/hive/bin/schematool -dbType postgres -info || /opt/hive/bin/schematool -dbType postgres -initSchema --verbose
              /opt/hive/bin/hive --service metastore
          ports:
            - containerPort: 9083
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: hive-metastore-config
---
apiVersion: v1
kind: Service
metadata:
  name: hive-metastore
  namespace: trino
spec:
  selector:
    app: hive-metastore
  ports:
    - port: 9083
      targetPort: 9083
