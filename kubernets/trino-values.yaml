# Trino Helm values - Minikube single-node (coordinator only, no worker)
# Chart: trino/trino

image:
  tag: "435"

server:
  workers: 0

coordinator:
  config:
    nodeScheduler:
      includeCoordinator: true
  jvm:
    maxHeapSize: "1536m"
  startupProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 30
  resources:
    requests:
      cpu: 500m
      memory: "2Gi"
    limits:
      cpu: "1"
      memory: "2500Mi"

worker:
  enabled: false

service:
  type: NodePort
  port: 8081

catalogs:
  iceberg: |
    connector.name=iceberg
    iceberg.catalog.type=hive_metastore
    hive.metastore.uri=thrift://hive-metastore.trino.svc.cluster.local:9083
    hive.config.resources=/opt/trino/core-site.xml
    iceberg.register-table-procedure.enabled=true
    hive.s3.endpoint=http://host.minikube.internal:9000
    hive.s3.aws-access-key=dtai16805
    hive.s3.aws-secret-key=dtai16805
    hive.s3.path-style-access=true
    hive.s3.ssl.enabled=false

configMounts:
  - name: core-site
    configMap: trino-core-site
    path: /opt/trino/core-site.xml
    subPath: core-site.xml

init:
  adminUser:
    username: admin
    password: admin

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 250m
    memory: 512Mi
